<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu-icon" class="menu-icon">
        <span></span><span></span><span></span>
    </div>

    <nav id="sidebar" class="sidebar">
        <button class="tab-btn active" onclick="openTab('home')">Home</button>
        <button class="tab-btn" onclick="openTab('links')">Useful Links</button>
        <button class="tab-btn" onclick="openTab('my-gourmet')">My Gourmet</button>
        <button class="tab-btn" onclick="openTab('ito')">ito Helper</button>
        <button class="tab-btn" onclick="openTab('message')">Contact Me</button>
        <button class="tab-btn" onclick="openTab('fortune')">Fortune</button>
    </nav>

    <div class="container">
        <header><h1>My Portal</h1></header>

        <div id="home" class="tab-content active">
            <h2>Welcome</h2>
            <p>メニューから機能を選択してください。</p>
        </div>

        <div id="links" class="tab-content">
            <h2>Quick Links</h2>
            <ul class="link-list">
                <li><a href="http://www.astron.sci.edu.saitama-u.ac.jp/" target="_blank">埼玉大学 宇宙物理学研究室</a></li>
                <li><a href="https://ui.adsabs.harvard.edu/" target="_blank">NASA ADS</a></li>
                <!-- <li><a href="https://github.com/" target="_blank">GitHub</a></li> -->
            </ul>
        </div>

       <div id="my-gourmet" class="tab-content">
    <h2>My Gourmet List</h2>
    
    <!-- 絞り込み設定 -->
    <div style="background: #1a1a2e; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <p style="font-size: 0.9rem; margin-bottom: 8px;">1. ジャンルを選択</p>
        <select id="gourmet-genre-select" style="width: 100%;">
            <option value="all">すべて表示</option>
            <option value="ラーメン">🍜 ラーメン</option>
            <option value="定食">🍱 定食</option>
            <option value="カフェ">☕ カフェ・スイーツ</option>
            <option value="イタリアン">🍝 イタリアン</option>
        </select>

        <p style="font-size: 0.9rem; margin: 15px 0 8px;">2. ステータスを選択</p>
        <select id="gourmet-status-select" style="width: 100%;">
            <option value="all">すべて（混在）</option>
            <option value="visited">行ってよかった（評価あり）</option>
            <option value="wishlist">行ってみたい（未開拓）</option>
        </select>

        <button onclick="updateGourmetList()" style="width: 100%; margin-top: 15px;">近い順に検索</button>
    </div>
    
    <div id="gourmet-list" style="text-align:left;">
        <!-- ここに結果が出ます -->
    </div>
 </div>
        <!-- ito用 乱数生成ツール -->
        <div id="ito" class="tab-content">
            <h2>ito Helper</h2>
            <p>1〜100の数字をランダムに引きます。<br>他の人に見られないように注意！</p>
            <div id="number-display" style="font-size: 5rem; font-weight: bold; color: #4cc9f0; margin: 20px 0; min-height: 120px;">?</div>
            <button onclick="generateRandomNumber()">数字を引く</button>
            <p style="margin-top: 20px; font-size: 0.8rem; color: #888;">※クリックするたびに新しい数字が出ます</p>
        </div>

        <div id="message" class="tab-content">
            <h2>お便りコーナー</h2>
            <p>メッセージを送ると管理者に届きます。<br>返信が必要な方はメアドを添えてください。</p>
            <form action="https://formspree.io/f/あなたのID" method="POST">
                <input type="text" name="name" placeholder="お名前" required>
                <textarea name="message" placeholder="メッセージ内容" required></textarea>
                <button type="submit">送信する</button>
            </form>
        </div>

        <div id="fortune" class="tab-content">
            <h2>Fortune Teller</h2>
            <p id="fortune-text">今日の運勢を占おう！</p>
            <button onclick="tellFortune()">占う</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
