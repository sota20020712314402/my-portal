<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu-icon" class="menu-icon">
        <span></span><span></span><span></span>
    </div>

    <nav id="sidebar" class="sidebar">
        <button class="tab-btn active" onclick="openTab('home')">Home</button>
        <button class="tab-btn" onclick="openTab('links')">Useful Links</button>
        <button class="tab-btn" onclick="openTab('my-gourmet')">My Gourmet</button>
        <button class="tab-btn" onclick="openTab('ito')">ito Helper</button>
        <button class="tab-btn" onclick="openTab('message')">Contact Me</button>
        <button class="tab-btn" onclick="openTab('fortune')">Fortune</button>
    </nav>

    <div class="container">
        <header><h1>My Portal</h1></header>

        <div id="home" class="tab-content active">
            <h2>Welcome</h2>
            <p>メニューから機能を選択してください。</p>
        </div>

        <div id="links" class="tab-content">
            <h2>Quick Links</h2>
            <ul class="link-list">
                <li><a href="http://www.astron.sci.edu.saitama-u.ac.jp/" target="_blank">埼玉大学 宇宙物理学研究室</a></li>
                <li><a href="https://ui.adsabs.harvard.edu/" target="_blank">NASA ADS</a></li>
                <li><a href="https://github.com/" target="_blank">GitHub</a></li>
            </ul>
        </div>

       <!-- グルメタブ -->
        <div id="my-gourmet" class="tab-content">
        <h2>My Gourmet List</h2>
        <div style="background: #1a1a2e; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <p style="font-size: 0.8rem; margin-bottom: 5px;">ジャンル</p>
            <select id="gourmet-genre-select">
                <option value="all">すべて表示</option>
                <option value="ラーメン">🍜 ラーメン</option>
                <option value="定食">🍱 定食</option>
                <option value="和食">🍱 和食</option>
                <option value="焼き肉">🍖 焼き肉</option>
                <option value="ステーキ">🥩 ステーキ</option>
                <option value="うどん">🍜 うどん</option>
                <option value="寿司">🍣 寿司</option>
                <option value="パン">🍞 パン</option>
                <option value="イタリアン">🍝 イタリアン</option>
                <option value="ハンバーガー">🍔 ハンバーガー</option>
                <option value="居酒屋">🍶 居酒屋</option>
                <option value="カフェ">☕ カフェ・スイーツ</option>
            </select>

            <!-- ここを追加：ステータスの選択がないとJSでエラーになる可能性があります -->
            <p style="font-size: 0.8rem; margin: 10px 0 5px;">ステータス</p>
            <select id="gourmet-status-select">
                <option value="all">すべて</option>
                <option value="visited">行ってよかった</option>
                <option value="wishlist">行ってみたい</option>
            </select>

            <button onclick="updateGourmetList()" style="width: 100%; margin-top: 15px;">近い順に検索</button>
        </div>
        <div id="gourmet-list" style="text-align:left;"></div>
        </div>
        <div id="admin" class="tab-content">
    <h2>ショップデータ生成</h2>
    <div style="background: #1a1a2e; padding: 20px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px;">
        <input type="text" id="in-name" placeholder="店名">
        <input type="text" id="in-area" placeholder="地域">
        <div style="display:flex; gap:10px;">
            <input type="number" id="in-lat" placeholder="緯度" step="any">
            <input type="number" id="in-lng" placeholder="経度" step="any">
        </div>
        <select id="in-cat">
            <option value="居酒屋">居酒屋</option>
            <option value="パン">パン</option>
            <!-- 他のジャンルも追加 -->
        </select>
        <textarea id="in-comment" placeholder="コメント" style="height:60px;"></textarea>
        <input type="text" id="in-rec" placeholder="おすすめメニュー">
        <label style="font-size:0.8rem;"><input type="checkbox" id="in-hyaku"> 百名店</label>
        
        <button onclick="generateJSON()">JSONコードを生成</button>
        
        <p style="font-size:0.7rem; margin-top:10px;">生成されたコード（shops.jsonに貼り付け用）:</p>
        <textarea id="out-json" readonly style="height:150px; font-family:monospace; font-size:0.7rem;"></textarea>
    </div>
    </div>
        <!-- itoタブ -->
        <div id="ito" class="tab-content">
            <h2>ito Helper</h2>
            <p>1〜100の数字をランダムに引きます。</p>
            <div id="number-display" style="font-size: 5rem; font-weight: bold; color: #4cc9f0; margin: 20px 0;">?</div>
            <button onclick="generateRandomNumber()">数字を引く</button>
        </div>

        <!-- お便りタブ -->
        <div id="message" class="tab-content">
            <h2>お便りコーナー</h2>
            <p>管理者にメールが届きます。<br>返信が必要な方はメアドを書いてください！</p>
            <form action="https://formspree.io/f/あなたのID" method="POST">
                <input type="text" name="name" placeholder="お名前" required>
                <textarea name="message" placeholder="メッセージ内容" required></textarea>
                <button type="submit">送信する</button>
            </form>
        </div>

        <div id="fortune" class="tab-content">
            <h2>Fortune Teller</h2>
            <p id="fortune-text">今日の運勢を占おう！</p>
            <button onclick="tellFortune()">占う</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
